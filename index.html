<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дизайны для заказчика</title>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            box-sizing: border-box;
        }
        body {
            background: #1e1e1e;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ccc;
            font-weight: 300;
            margin-bottom: 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            justify-items: center;
            align-items: center;
            margin-top: 30px;
        }
        .gallery canvas {
            max-width: 100%;
            height: auto;
            border: 3px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: #2a2a2a;
            display: block;
        }
        @media (max-width: 500px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
        .message {
            color: #aaa;
            font-size: 1.2em;
            margin-top: 50px;
            grid-column: 1 / -1;
        }
        footer {
            margin-top: 40px;
            font-size: 0.8em;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Просмотр дизайнов</h1>
    <div class="gallery" id="gallery"></div>
    <footer>© Все права защищены</footer>

    <script>
        const owner = 'HeroInDaClub';
        const repo = 'democite';
        const folder = 'images';

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div class="message">Загрузка...</div>';
            console.log('Начинаем загрузку списка файлов...');

            try {
                // 1. Запрос к GitHub API
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${folder}`);
                console.log('Статус ответа API:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ошибка ${response.status}`);
                }

                const files = await response.json();
                console.log('Получены файлы:', files);

                // 2. Фильтруем изображения
                const imageFiles = files.filter(file => 
                    file.type === 'file' && /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(file.name)
                );
                console.log('Найдено изображений:', imageFiles.length);

                if (imageFiles.length === 0) {
                    gallery.innerHTML = '<div class="message">Нет загруженных дизайнов</div>';
                    return;
                }

                // 3. Очищаем галерею
                gallery.innerHTML = '';

                // 4. Обрабатываем каждый файл
                for (const file of imageFiles) {
                    console.log('Обрабатываем файл:', file.name);
                    try {
                        const imgResponse = await fetch(file.download_url);
                        if (!imgResponse.ok) {
                            console.warn('Не удалось загрузить', file.name);
                            continue;
                        }
                        const blob = await imgResponse.blob();
                        const url = URL.createObjectURL(blob);

                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        const img = new Image();
                        await new Promise((resolve, reject) => {
                            img.onload = resolve;
                            img.onerror = reject;
                            img.src = url;
                        });

                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);

                        // Водяной знак с адаптивным размером
                        const fontSize = Math.max(20, Math.floor(img.height * 0.05));
                        ctx.font = `bold ${fontSize}px Arial`;
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('ДЛЯ ЗАКАЗЧИКА', canvas.width / 2, canvas.height - fontSize * 1.5);

                        gallery.appendChild(canvas);
                        URL.revokeObjectURL(url);
                    } catch (err) {
                        console.error('Ошибка при обработке', file.name, err);
                    }
                }
                console.log('Загрузка завершена');
            } catch (error) {
                console.error('Ошибка загрузки списка:', error);
                gallery.innerHTML = `<div class="message">Ошибка: ${error.message}</div>`;
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        loadImages();
    </script>
</body>
</html>
