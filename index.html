<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дизайны для заказчика</title>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            box-sizing: border-box;
        }
        body {
            background: #1e1e1e;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ccc;
            font-weight: 300;
            margin-bottom: 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            justify-items: center;
            align-items: center;
            margin-top: 30px;
        }
        .gallery canvas {
            max-width: 100%;
            height: auto;
            border: 3px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: #2a2a2a;
            display: block;
        }
        @media (max-width: 500px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
        .message {
            color: #aaa;
            font-size: 1.2em;
            margin-top: 50px;
            grid-column: 1 / -1;
        }
        footer {
            margin-top: 40px;
            font-size: 0.8em;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Просмотр дизайнов</h1>
    <div class="gallery" id="gallery"></div>
    <footer>© Все права защищены</footer>

    <script>
        const owner = 'HeroInDaClub';
        const repo = 'democite';
        const folder = 'images';

        // Функция для определения целевого размера canvas
        function getTargetSize(imgWidth, imgHeight) {
            // Максимальная ширина для отображения (можно менять под свои предпочтения)
            const MAX_WIDTH = 1200;
            // Но также учитываем ширину окна, чтобы на мобильных не было слишком широко
            const windowWidth = window.innerWidth * 0.9; // 90% ширины окна с учётом отступов
            const maxAllowed = Math.min(MAX_WIDTH, windowWidth);

            if (imgWidth <= maxAllowed) {
                // Изображение и так небольшое — оставляем как есть
                return { width: imgWidth, height: imgHeight };
            } else {
                // Масштабируем, сохраняя пропорции
                const ratio = maxAllowed / imgWidth;
                return {
                    width: maxAllowed,
                    height: imgHeight * ratio
                };
            }
        }

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div class="message">Загрузка...</div>';

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${folder}`);
                if (!response.ok) throw new Error('Не удалось загрузить список файлов');

                const files = await response.json();
                const imageFiles = files.filter(file => 
                    file.type === 'file' && /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(file.name)
                );

                if (imageFiles.length === 0) {
                    gallery.innerHTML = '<div class="message">Нет загруженных дизайнов</div>';
                    return;
                }

                gallery.innerHTML = '';

                for (const file of imageFiles) {
                    try {
                        const imgResponse = await fetch(file.download_url);
                        const blob = await imgResponse.blob();
                        const url = URL.createObjectURL(blob);

                        const img = new Image();
                        await new Promise((resolve, reject) => {
                            img.onload = resolve;
                            img.onerror = reject;
                            img.src = url;
                        });

                        // Определяем целевой размер canvas
                        const target = getTargetSize(img.width, img.height);

                        // Создаём canvas нужного размера
                        const canvas = document.createElement('canvas');
                        canvas.width = target.width;
                        canvas.height = target.height;
                        const ctx = canvas.getContext('2d');

                        // Рисуем изображение, масштабируя под canvas
                        ctx.drawImage(img, 0, 0, target.width, target.height);

                        // Водяной знак с размером шрифта относительно высоты canvas
                        const fontSize = Math.max(16, Math.floor(target.height * 0.05));
                        ctx.font = `bold ${fontSize}px Arial`;
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('ДЛЯ ЗАКАЗЧИКА', target.width / 2, target.height - fontSize * 1.5);

                        gallery.appendChild(canvas);
                        URL.revokeObjectURL(url);
                    } catch (err) {
                        console.warn('Ошибка обработки файла', file.name, err);
                    }
                }
            } catch (error) {
                gallery.innerHTML = `<div class="message">Ошибка: ${error.message}</div>`;
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        loadImages();
    </script>
</body>
</html>
